<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiSeo RP Archive</title>

<style>

body{
background:#f5f8fa;
font-family:Arial;
margin:0;
}

.container{
max-width:600px;
margin:auto;
background:white;
border-left:1px solid #e6ecf0;
border-right:1px solid #e6ecf0;
min-height:100vh;
}

.header{
padding:15px;
border-bottom:1px solid #e6ecf0;
font-size:20px;
font-weight:bold;
}

.profile{
display:flex;
align-items:center;
padding:15px;
border-bottom:1px solid #e6ecf0;
}

.profile img{
width:60px;
height:60px;
border-radius:50%;
margin-right:12px;
}

.profile-name{
font-size:18px;
font-weight:bold;
}

.world{
padding:15px;
border-bottom:1px solid #e6ecf0;
}

.world-title{
font-weight:bold;
font-size:16px;
margin-bottom:8px;
}

.thread{
padding:10px;
border:1px solid #e6ecf0;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.thread:hover{
background:#f5f8fa;
}

.new{
color:white;
background:#1da1f2;
padding:2px 6px;
border-radius:4px;
font-size:12px;
margin-left:6px;
}

.tweet{
display:flex;
padding:15px;
border-bottom:1px solid #e6ecf0;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
margin-right:12px;
}

.name{
font-weight:bold;
}

.id{
color:#657786;
margin-left:6px;
}

.text{
margin-top:4px;
font-size:15px;
line-height:1.4;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
SiSeo RP Archive
</div>

<div class="profile">
<img src="https://i.imgur.com/4Z7AzHf.png">
<div>
<div class="profile-name">시현 & 서현</div>
<div>@rp_archive</div>
</div>
</div>

<div class="world">

<div class="world-title">
카페 AU
</div>

<div class="thread">
카페 AU 첫 만남 <span class="new">NEW</span>
</div>

<div class="thread">
비 오는 날의 대화
</div>

</div>

<div class="header">
카페 AU 첫 만남
</div>

<div class="tweet">
<img class="avatar" src="https://i.imgur.com/4Z7AzHf.png">
<div>
<span class="name">시현</span>
<span class="id">@sihyun</span>
<div class="text">
오늘 카페 안 열어?
</div>
</div>
</div>

<div class="tweet">
<img class="avatar" src="https://i.imgur.com/4Z7AzHf.png">
<div>
<span class="name">서현</span>
<span class="id">@seohyun</span>
<div class="text">
열었지. 너만 기다렸는데.
</div>
</div>
</div>

</div>

</body>
</html>
